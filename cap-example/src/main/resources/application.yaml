# =====================================================
# CAP Example 应用配置
# =====================================================

# 应用基本配置
app:
  name: cap-example
  version: 1.0.0
  description: CAP Framework 示例应用 - Web MVC + 事务管理

# 服务器配置（端口使用默认值 8080，可通过命令行 --server.port=<port> 覆盖）
server:
  servlet:
    context-path: /

# 日志配置
logging:
  level:
    root: INFO
    org.moper.cap: DEBUG
    org.moper.cap.transaction: DEBUG
    org.moper.cap.data: DEBUG
    org.moper.cap.web: DEBUG

# =====================================================
# 数据库配置
# 默认使用 H2 内存数据库（开发/测试环境）。
# 生产环境请通过命令行参数覆盖，例如：
#   --database.driver=com.mysql.cj.jdbc.Driver
#   --database.url=jdbc:mysql://localhost:3306/mydb
#   --database.username=root
#   --database.password=secret
# =====================================================

# =====================================================
# Web 配置
# =====================================================
web:
  mvc:
    # 静态资源路径
    static-locations:
      - classpath:/static/
      - classpath:/public/

    # 视图前缀后缀
    view:
      prefix: /
      suffix: .html
